    summary: "ByteDance launched Seedance 2.0, capable of generating 90-second branded videos with native audio. Already integrated into Flova and Krea Enterprise. The jump from ~5 second clips to 90 seconds with coherent audio is getting attention from creators and developers building video pipelines."
