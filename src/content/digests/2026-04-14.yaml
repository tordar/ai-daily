  - title: "4chan Users Discovered Chain-of-Thought Reasoning in 2022"
    summary: "New research reveals AI Dungeon players on 4chan accidentally elicited chain-of-thought reasoning from LLMs in 2022, over a year before Google researchers claimed the discovery. The finding went viral on HN and Reddit, sparking debate about academic credit in AI."
    url: "https://news.ycombinator.com"
    source: "news.ycombinator.com"
    tag: "community"
    significance: 3
  - title: "NVIDIA Hosts Quantum Day — Hybrid Quantum-GPU Computing"
    summary: "NVIDIA's Quantum Day showcased AI-accelerated quantum hardware, error correction breakthroughs, and hybrid quantum-GPU supercomputing architectures. The event signals NVIDIA is positioning itself at the intersection of quantum and AI compute."
    url: "https://www.nvidia.com"
