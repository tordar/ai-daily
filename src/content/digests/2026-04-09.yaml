    summary: "Z.ai released GLM-5.1 under MIT license, a model specifically built for extended autonomous engineering sessions rather than short reasoning bursts. Designed for multi-hour coding tasks where the model needs to maintain coherent plans across long contexts."
    url: "https://github.com"
    source: "github.com"
