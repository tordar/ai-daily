    summary: "Four Claude Code extension repos are trending on GitHub this week, collectively gaining 8K+ stars: andrej-karpathy-skills, claude-code-best-practice, claude-mem, and learn-claude-code. The pattern signals Claude Code is becoming a platform with its own ecosystem, similar to VS Code extensions circa 2018."
