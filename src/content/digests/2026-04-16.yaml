  - title: "Claude Mythos: 93.9% SWE-bench, Found Zero-Days in Every Major OS"
    summary: "Anthropic confirmed Claude Mythos, scoring 93.9% on SWE-bench Verified and 97.6% on USAMO. The model autonomously discovered zero-day vulnerabilities in every major OS and browser during testing, including a 27-year-old OpenBSD bug. Access restricted to 50 organizations under Project Glasswing."
