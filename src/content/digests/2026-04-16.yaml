    summary: "Anthropic is preparing to release Claude Opus 4.7, its next flagship model optimized for multi-step reasoning and multi-agent coordination. Expected alongside a full-stack app creation platform and a unified Claude Code interface. Polymarket odds favor a launch by April 18-19."
