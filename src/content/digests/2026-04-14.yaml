  - title: "OpenAI Splits Codex into Basic and Advanced Tiers"
    summary: "OpenAI restructured Codex with separate Basic and Advanced tiers, adding app preview, scratchpad, a Pull Requests section, and inline comments on previewed UI. The split gives power users deeper integration while keeping the entry point accessible."
    url: "https://openai.com/news/"
    source: "openai.com"
    tag: "tools"
    significance: 4
  - title: "Microsoft's markitdown Converts Any Doc to LLM-Ready Markdown"
    summary: "Microsoft open-sourced markitdown, converting PDFs, DOCX, PPTX, HTML and other formats into clean Markdown suitable for LLM context windows. Gained 3,600+ stars in its first week. Solves a pain point every RAG pipeline developer has hit."
