  - title: "Anthropic Releases Advisor Strategy — Opus Supervises Sonnet for Less"
    summary: "Anthropic shipped the Advisor Strategy for the Messages API, pairing Opus 4.6 as an advisor to Sonnet or Haiku. Scores 2.7 percentage points higher on SWE-bench Multilingual than Sonnet alone while costing 11.9% less per task. A practical pattern for production agent deployments."
    url: "https://www.anthropic.com/news"
    source: "anthropic.com"
    tag: "tools"
    significance: 5
  - title: "Visa and Nevermined Enable AI Agent Card Payments"
    summary: "Visa partnered with Nevermined to let AI agents make autonomous card purchases within cardholder-defined policies, using Visa Intelligent Commerce and Coinbase's x402 protocol. Agents can now spend money on your behalf with configurable limits."
    url: "https://www.visa.com"
    source: "visa.com"
    tag: "industry"
    significance: 4
  - title: "OpenAI Launches $100/Month Pro Tier with 5x Codex Usage"
    summary: "OpenAI introduced a Pro tier at $100/month offering 5x more Codex usage than Plus, with a limited-time 10x promotion through May 31. Aimed at power users and developers who've been hitting Plus limits on agent-heavy workflows."
    url: "https://openai.com/news/"
    source: "openai.com"
    tag: "tools"
