    summary: "MiniMax released M2.7, hitting 56.22% on SWE-Pro and 57.0% on Terminal Bench 2. The model's three-component system (short-term memory, self-feedback, self-optimization) lets it improve over 24-hour windows. Medal rate of 66.6% matches Gemini-3.1, trailing only Claude Opus-4.6 (75.7%) and GPT-5.4 (71.2%)."
