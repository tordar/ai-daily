  - title: "Harvey Launches End-to-End Autonomous Legal Agents"
    summary: "Harvey shipped legal agents that autonomously draft memos, diligence reports, and presentations. The agents reason through complex legal problems end-to-end and produce review-ready documents, marking a shift from AI-assisted to AI-led legal work."
    url: "https://www.harvey.ai"
