  - title: "Google ADK Becomes the Most Complete Multi-Agent Framework"
    summary: "Google's Agent Development Kit (adk-python) hit 8,200+ stars and emerged as the most fully-featured multi-agent framework this month. Meanwhile Block's Goose takes a different approach: local-first with native MCP support for tool integration."
