  - title: "Google Open-Sources Magika: File Detection Trained on 100M Files"
    summary: "Google open-sourced Magika, its internal AI file type detection tool with 99% accuracy across 200+ content types. Previously used to scan hundreds of billions of files weekly across Gmail and Drive. Now available for developers to build into their own pipelines."
